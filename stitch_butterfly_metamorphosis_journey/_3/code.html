<script>
        // Micro-interaction for cards
        document.querySelectorAll('.bg-surface-container-low').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-4px)';
                card.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
            });
        });

        // Simple scroll observer for fading narrative
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = "1";
                    entry.target.style.filter = "blur(0px)";
                } else {
                    entry.target.style.opacity = "0.5";
                    entry.target.style.filter = "blur(1px)";
                }
            });
        }, observerOptions);

        document.querySelectorAll('section').forEach(section => {
            section.style.transition = "opacity 0.6s ease, filter 0.6s ease";
            observer.observe(section);
        });
    </script>
